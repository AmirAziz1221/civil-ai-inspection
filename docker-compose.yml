version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civilscan-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models         # Mount your .pt model files here
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/reports:/app/reports
    env_file:
      - ./backend/.env
    environment:
      - MODELS_DIR=/app/models
      - DB_PATH=/app/inspections.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civilscan-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  default:
    name: civilscan-network
